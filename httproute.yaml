apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: iyas-route
  namespace: iyas-ns
spec:
  parentRefs:
  - name: iyas-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: flipkart-service   # ✅ USE THIS
      port: 80                 # ✅ SAFE PORT