apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: iyas-httproute
spec:
  parentRefs:
  - name: iyas-gateway
  # hostnames:
  # - "www.example.com"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: trans-service
      port: 3000