apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: fitness-route
spec:
  parentRefs:
  - name: iyas-gateway   # must match your Gateway name

  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /fitness
    backendRefs:
    - name: fitness-tracker-service
      port: 80